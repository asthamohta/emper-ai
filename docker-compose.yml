services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: emper-postgres
    environment:
      POSTGRES_USER: emper
      POSTGRES_PASSWORD: emper_secret
      POSTGRES_DB: emper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
